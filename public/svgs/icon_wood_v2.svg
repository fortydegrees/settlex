<svg viewBox="0 0 230 210" xmlns="http://www.w3.org/2000/svg">
  <!-- Wood/Lumber Resource Icon — 3-log pyramid stack -->
  <!-- The bottom two logs are drawn as circles (end-on view) with the top log as a longer log on top -->
  <!-- This gives a "classic timber pile" look that reads clearly -->

  <!-- ===== BOTTOM-LEFT LOG (viewed from end = circle) ===== -->
  <!-- Body (short, mostly hidden behind face) -->
  <rect x="28" y="122" width="80" height="60" rx="30" ry="30" fill="#5C3A1E"/>
  <rect x="28" y="122" width="80" height="60" rx="30" ry="30" fill="none" stroke="#2A1A0B" stroke-width="5"/>
  <!-- Face -->
  <circle cx="68" cy="152" r="30" fill="#C9A066"/>
  <circle cx="68" cy="152" r="30" fill="none" stroke="#2A1A0B" stroke-width="5"/>
  <clipPath id="fBL"><circle cx="68" cy="152" r="30"/></clipPath>
  <rect x="38" y="122" width="60" height="24" fill="#D9B87A" clip-path="url(#fBL)"/>
  <circle cx="68" cy="152" r="16" fill="none" stroke="#A07840" stroke-width="2.5"/>
  <circle cx="68" cy="152" r="4" fill="#7A4E2A"/>

  <!-- ===== BOTTOM-RIGHT LOG (viewed from end = circle) ===== -->
  <rect x="100" y="122" width="100" height="60" rx="30" ry="30" fill="#5C3A1E"/>
  <rect x="100" y="122" width="100" height="60" rx="30" ry="30" fill="none" stroke="#2A1A0B" stroke-width="5"/>
  <clipPath id="hBR"><rect x="100" y="122" width="100" height="60" rx="30" ry="30"/></clipPath>
  <rect x="100" y="122" width="100" height="24" fill="#7A4E2A" clip-path="url(#hBR)"/>
  <!-- Face -->
  <circle cx="130" cy="152" r="30" fill="#C9A066"/>
  <circle cx="130" cy="152" r="30" fill="none" stroke="#2A1A0B" stroke-width="5"/>
  <clipPath id="fBR"><circle cx="130" cy="152" r="30"/></clipPath>
  <rect x="100" y="122" width="60" height="24" fill="#D9B87A" clip-path="url(#fBR)"/>
  <circle cx="130" cy="152" r="16" fill="none" stroke="#A07840" stroke-width="2.5"/>
  <circle cx="130" cy="152" r="4" fill="#7A4E2A"/>

  <!-- ===== TOP LOG (longer, sitting on top of both circles) ===== -->
  <rect x="30" y="56" width="176" height="60" rx="30" ry="30" fill="#5C3A1E"/>
  <rect x="30" y="56" width="176" height="60" rx="30" ry="30" fill="none" stroke="#2A1A0B" stroke-width="5"/>
  <clipPath id="hT"><rect x="30" y="56" width="176" height="60" rx="30" ry="30"/></clipPath>
  <rect x="30" y="56" width="176" height="25" fill="#7A4E2A" clip-path="url(#hT)"/>
  <!-- Face -->
  <ellipse cx="60" cy="86" rx="26" ry="30" fill="#C9A066"/>
  <ellipse cx="60" cy="86" rx="26" ry="30" fill="none" stroke="#2A1A0B" stroke-width="5"/>
  <clipPath id="fT"><ellipse cx="60" cy="86" rx="26" ry="30"/></clipPath>
  <rect x="34" y="56" width="52" height="24" fill="#D9B87A" clip-path="url(#fT)"/>
  <ellipse cx="60" cy="86" rx="14" ry="17" fill="none" stroke="#A07840" stroke-width="2.5"/>
  <circle cx="60" cy="86" r="4" fill="#7A4E2A"/>
</svg>
