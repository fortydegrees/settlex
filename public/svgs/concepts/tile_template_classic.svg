      <stop offset="0" stop-color="#d8e3ea" />
      <stop offset="0.56" stop-color="#a6b8c5" />
      <stop offset="1" stop-color="#6f8594" />
    </radialGradient>

    <linearGradient id="tileRingOuterGradient" gradientUnits="userSpaceOnUse" x1="173" y1="28" x2="173" y2="372">
      <stop offset="0" stop-color="#f8fbfd" />
      <stop offset="0.34" stop-color="#c4d0d9" />
      <stop offset="1" stop-color="#8296a4" />
    </linearGradient>

    <linearGradient id="tileRingInnerGradient" gradientUnits="userSpaceOnUse" x1="173" y1="44" x2="173" y2="356">
      <stop offset="0" stop-color="#e8f0f5" />
      <stop offset="0.62" stop-color="#a8bac7" />
      <stop offset="1" stop-color="#778d9d" />
    </linearGradient>

    <radialGradient id="tileBadgeFill" gradientUnits="userSpaceOnUse" cx="154" cy="170" r="120">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98" />
      <stop offset="0.74" stop-color="#d8e1e8" />
      <stop offset="1" stop-color="#bcc9d3" />
    </radialGradient>

    <linearGradient id="tileBadgeStroke" gradientUnits="userSpaceOnUse" x1="173" y1="140" x2="173" y2="288">
