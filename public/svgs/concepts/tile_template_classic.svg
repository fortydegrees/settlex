    <radialGradient id="tileVignette" gradientUnits="userSpaceOnUse" cx="173" cy="224" r="194">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0" />
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.18" />
