    <rect x="32" y="32" width="192" height="192" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="3 3" />
    <line x1="128" y1="0" x2="128" y2="256" stroke="#475569" stroke-width="1" />
    <line x1="0" y1="128" x2="256" y2="128" stroke="#475569" stroke-width="1" />
    <circle cx="128" cy="128" r="2.5" fill="#475569" />
  </g>

