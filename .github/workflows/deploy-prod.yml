name: deploy-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.13.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  deploy:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_KEY }}

      - name: Add OCI host to known_hosts
        run: ssh-keyscan -H "$OCI_HOST" >> ~/.ssh/known_hosts
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}

      - name: Sync deployment files to OCI
        env:
          OCI_APP_DIR: ${{ secrets.OCI_APP_DIR }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
        run: |
          ssh "$OCI_USER@$OCI_HOST" "mkdir -p '$OCI_APP_DIR'"
          rsync -az --delete \
            --filter=':- .gitignore' \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env.prod' \
            ./ "$OCI_USER@$OCI_HOST:$OCI_APP_DIR/"

      - name: Deploy to OCI
        env:
          OCI_APP_DIR: ${{ secrets.OCI_APP_DIR }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
        run: |
          ssh "$OCI_USER@$OCI_HOST" "
            cd '$OCI_APP_DIR' &&
            infra/scripts/deploy-prod.sh
          "
