services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: settlex
      POSTGRES_USER: settlex
      POSTGRES_PASSWORD: settlex
    ports:
      - "55432:5432"
    volumes:
      - settlex-postgres-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  settlex-postgres-local:
